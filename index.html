@font-face {

body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: 'CandyBeans', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
  color: white;
}

/* FONDO */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image: url('fondo.jpg');
  background-repeat: repeat;
  background-size: 450px;
  opacity: 0.6;
  filter: contrast(1.3) brightness(0.9);
  transform: scale(1.35);
  animation: moveBg 25s ease-in-out infinite alternate;
  z-index: 0;
}

@keyframes moveBg {
  0% { background-position: 0 0; transform: scale(1.32); }
  100% { background-position: 220px 420px; transform: scale(1.42); }
}

/* OVERLAY */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, rgba(0,0,0,0.25), rgba(0,0,0,0.88));
  z-index: 1;
}

/* CONTENEDOR */
.container {
  position: relative;
  z-index: 3;
  width: 100%;
  max-width: 420px;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding-bottom: 120px; /* espacio para el botón */
}

.lyrics {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  padding: 0 20px;
  width: 100%;
  flex: 1;
  justify-content: center;
}

/* ANIMACIONES INSPIRADAS EN EL VIDEO */
.line {
  text-align: center;
  opacity: 0;
  transform: translateY(30px) scale(0.85);
  filter: blur(6px);
  will-change: transform, opacity, filter;
  transition: 
    opacity 0.45s cubic-bezier(0.23, 1, 0.32, 1),
    transform 0.55s cubic-bezier(0.23, 1, 0.32, 1),
    filter 0.55s cubic-bezier(0.23, 1, 0.32, 1);
  font-size: clamp(15px, 4.8vw, 27px);
  line-height: 1.35;
  max-width: 100%;
}

.line.show {
  opacity: 1;
  transform: translateY(0) scale(1);
  filter: blur(0);
}

.line.active {
  color: #fff;
  transform: scale(1.06);
  filter: blur(0);
  text-shadow: 
    0 0 15px rgba(255,255,255,0.5),
    0 0 30px rgba(255,255,255,0.25);
  animation: activePop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
}

@keyframes activePop {
  0%   { transform: scale(0.92); }
  60%  { transform: scale(1.12); }
  100% { transform: scale(1.06); }
}

.line.prev,
.line.next {
  color: rgba(255,255,255,0.55);
  transform: scale(0.94);
  filter: blur(2px);
  opacity: 0.75;
}

/* Efecto typewriter */
.main {
  display: inline-block;
  position: relative;
}

.main::after {
  content: '';
  position: absolute;
  right: -4px;
  top: 0;
  height: 100%;
  width: 3px;
  background: rgba(255,255,255,0.7);
  animation: cursorBlink 0.8s step-end infinite;
  opacity: 0.6;
}

@keyframes cursorBlink {
  50% { opacity: 0; }
}

/* BARRA DE PROGRESO - Blanca y brillante */
.progress-container {
  width: 85%;
  margin: 40px 0 30px 0;
  position: relative;
}

.progress-bar {
  height: 5px;
  background: rgba(255,255,255,0.25);
  border-radius: 999px;
  overflow: hidden;
  box-shadow: 0 0 8px rgba(255,255,255,0.3);
}

.progress {
  height: 100%;
  background: linear-gradient(90deg, #ffffff, #f0f0f0);
  width: 0%;
  box-shadow: 
    0 0 15px #ffffff,
    0 0 30px rgba(255,255,255,0.6),
    inset 0 0 8px rgba(255,255,255,0.8);
  transition: width 0.1s linear;
}

.time {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  opacity: 0.7;
  margin-top: 6px;
}

/* BOTÓN */
button {
  position: fixed;
  bottom: 45px;
  left: 50%;
  transform: translateX(-50%);
  padding: 14px 28px;
  border-radius: 9999px;
  border: none;
  background: rgba(255,255,255,0.13);
  backdrop-filter: blur(16px);
  color: white;
  font-size: 15px;
  font-family: inherit;
  box-shadow: 0 10px 30px rgba(0,0,0,0.45),
              inset 0 0 0 1px rgba(255,255,255,0.18);
  transition: all 0.3s ease;
  z-index: 10;
}

button:hover {
  background: rgba(255,255,255,0.22);
  transform: translateX(-50%) scale(1.05);
}

<script>

function parseLRC(lrc) {
  return lrc.split("\n").map(line => {
    const m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
    if (!m) return null;
    return {
      time: parseInt(m[1]) * 60 + parseFloat(m[2]),
      text: m[3].trim()
    };
  }).filter(Boolean);
}

const lyrics = parseLRC(lrc);
const lineElements = Array.from(lyricsContainer.children);

let lastIndex = -1;
let swapTimer = null;

function paintLine(el, text, role, delay = 0) {
  el.style.transitionDelay = `${delay}ms`;

  if (text) {
    el.querySelector('.main').textContent = text;
  } else {
    el.querySelector('.main').textContent = '';
  }

  el.className = "line";

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      el.classList.add('show');
      if (role === "active") el.classList.add('active');
      else if (role === "prev") el.classList.add('prev');
      else if (role === "next") el.classList.add('next');
    });
  });
}

function updateLyrics() {
  const t = audio.currentTime + 0.22;

  let index = lyrics.findIndex(l => l.time > t) - 1;
  if (index < 0) index = 0;
  if (index >= lyrics.length) index = lyrics.length - 1;

  if (index === lastIndex) return;
  lastIndex = index;

  const prev = lyrics[index - 1];
  const curr = lyrics[index];
  const next = lyrics[index + 1];

  clearTimeout(swapTimer);

  swapTimer = setTimeout(() => {
    paintLine(lineElements[0], prev ? prev.text : "", "prev");
    paintLine(lineElements[1], curr ? curr.text : "", "active");
    paintLine(lineElements[2], next ? next.text : "", "next", 80);
  }, 40);
}

function updateProgress() {
  if (!audio.duration) return;
  const percent = (audio.currentTime / audio.duration) * 100;
  progress.style.width = percent + '%';

  currentTimeEl.textContent = formatTime(audio.currentTime);
  durationEl.textContent = formatTime(audio.duration);
}

function formatTime(seconds) {
  const min = Math.floor(seconds / 60);
  const sec = Math.floor(seconds % 60);
  return `${min}:${sec < 10 ? '0' : ''}${sec}`;
}

// Eventos principales
audio.ontimeupdate = () => {
  updateLyrics();
  updateProgress();
};

audio.onloadedmetadata = () => {
  durationEl.textContent = formatTime(audio.duration);
};

playBtn.onclick = () => {
  audio.play().then(() => {
    playBtn.style.display = "none";
  }).catch(() => {});
};

// Manejo de pestañas
let wasPlaying = false;

document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    if (!audio.paused) {
      wasPlaying = true;
      audio.pause();
    }
  } else {
    if (wasPlaying && audio.paused) {
      audio.play().catch(() => {
        playBtn.style.display = "block";
        playBtn.textContent = "Toca para continuar ▶";
      });
    }
  }
});

document.addEventListener("click", () => {
  if (wasPlaying && audio.paused) {
    audio.play().then(() => {
      if (playBtn.style.display !== "none") playBtn.style.display = "none";
    }).catch(() => {});
  }
});

audio.onended = () => {
  lyricsContainer.innerHTML = `
    <div style="color:white;text-align:center;font-size:26px;opacity:0.95;">
      Te quiero muchísimo, Sofía. 💖
    </div>
  `;
};
