<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

@font-face {
  font-family: 'CandyBeans';
  src: url('./CandyBeans.otf') format('opentype');
}

body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: 'CandyBeans', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
}

/* 💥 FONDO */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image: url('fondo.jpg');
  background-repeat: repeat;
  background-size: 450px;
  opacity: 0.6;
  filter: contrast(1.3) brightness(0.9);
  transform: scale(1.35);
  animation: moveBg 25s ease-in-out infinite alternate;
  z-index: 0;
}

@keyframes moveBg {
  0% { background-position: 0 0; transform: scale(1.32); }
  100% { background-position: 220px 420px; transform: scale(1.42); }
}

/* 🌑 OVERLAY */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, rgba(0,0,0,0.25), rgba(0,0,0,0.88));
  z-index: 1;
}

/* 📦 CONTENEDOR */
.container {
  position: relative;
  z-index: 3;
  width: 100%;
  max-width: 420px;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.lyrics {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  padding: 0 15px;
}

/* ✨ ANIMACIONES */
.line {
  text-align: center;
  opacity: 0;
  transform: translateY(25px) scale(0.92);
  filter: blur(5px);
  transition: all 0.5s ease;
}

.line.show {
  opacity: 1;
  transform: translateY(0) scale(1);
  filter: blur(0);
}

.line.active {
  color: white;
  transform: scale(1.15);
  text-shadow:
    0 0 15px rgba(255,255,255,0.5),
    0 0 40px rgba(255,255,255,0.2);
}

.line.active .main {
  animation: softZoom 0.6s ease;
  display: inline-block;
}

@keyframes softZoom {
  0% { transform: scale(0.96); opacity: 0.7; }
  45% { transform: scale(1.03); opacity: 1; }
  100% { transform: scale(1); }
}

.line.prev,
.line.next {
  color: rgba(255,255,255,0.55);
  transform: scale(0.95);
  filter: blur(1px);
}

/* 📱 TEXTO */
.main {
  font-size: clamp(13px, 4.1vw, 26px);
  line-height: 1.2;
}

/* 💥 BOTÓN */
button {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  padding: 14px 22px;
  border-radius: 999px;
  border: none;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(14px);
  color: white;
  font-size: 14px;
  font-family: inherit;
  box-shadow: 0 8px 25px rgba(0,0,0,0.4),
              inset 0 0 0 1px rgba(255,255,255,0.15);
  z-index: 4;
  transition: opacity 0.5s ease;
}

button:active {
  transform: translateX(-50%) scale(0.95);
}

</style>
</head>

<body>

<div class="container">
  <div id="lyrics" class="lyrics"></div>
  <button id="playBtn">Pulsa aquí ▶</button>
</div>

<audio id="audio" src="OGBlack.MP3" preload="auto"></audio>

<script>

const audio = document.getElementById('audio');
const lyricsContainer = document.getElementById('lyrics');
const playBtn = document.getElementById('playBtn');

const lrc = `[00:11.70] Te saco a pasear
[00:14.52] En un Banshee robao
[00:18.13] Como OG Black
[00:19.64] Como OG Black
[00:21.24] Como OG Black
[00:24.21] Hacemo' una porno
[00:26.96] En la parte de atrá'
[00:30.68] Como OG Black
[00:32.06] Como OG Black
[00:33.79] Como OG Black
[00:37.17] Que no pare el bellaqueo
[00:38.75] Que no pare el bellaqueo
[00:40.38] Que no pare el bellaqueo
[00:42.14] Que no pare el bellaqueo
[00:43.42] Que no pare el bellaqueo
[00:45.22] Que no pare el bellaqueo
[00:46.58] Que no pare el bellaqueo
[00:48.27] Que no pare el bellaqueo
[00:49.84] Ey, te miro a los ojo' y veo luce'
[00:53.16] Maldito sea el hombre que te use
[00:55.25] Tú-tú te mereces un cangri, tú no estás pa losers
[00:58.34] Que te lleve pa la feria y te gane to los peluche'
[01:01.20] Follow, follow, falo
[01:02.66] Mira lo que caché en el cruce (pa'l cruce)
[01:05.71] Flores, que la poli no me escuche
[01:07.78] Tú tienes lo tuyo y eso hace que me enmuse
[01:11.03] Te cargo to los paquete' si haces compra' en el super, ey
[01:14.39] Tú tás adelantá, ey
[01:15.92] Tesla Cyber Truck, ey
[01:17.34] Tiene un par atrás, ey
[01:18.92] Father con el Bo
[01:20.32] Tú me tiene' dando vueltas, ya me siento Tony Hawk
[01:23.16] Vestido de Christian Dior, yo le doy gracias a Dios
[01:26.16] Yo te saco a pasear
[01:29.85] En un Banshee robao
[01:32.71] Como OG Black, yeh
[01:34.67] Como OG Black, yeh
[01:35.92] Como OG Black
[01:38.99] Hacemo' una porno
[01:42.13] En la parte de atrá'
[01:45.32] Como OG Black, yeh
[01:46.97] Como OG Black, yeh
[01:48.69] Como OG Black
[01:50.90] ¿Qué, qué, qué?
[01:52.01] Que no pare el bellaqueo
[01:53.72] Que no pare el bellaqueo
[01:55.42] Que no pare el bellaqueo
[01:56.70] Que no pare el bellaqueo
[01:58.29] Que no pare el bellaqueo
[01:59.86] Que no pare el bellaqueo
[02:01.36] Que no pare el bellaqueo
[02:02.74] Que no-no-no (bellaqueo)
[02:06.61] Bella-
[02:10.17] Bellaqueo
[02:12.61] Bella-
[02:15.82] Bellaqueo
[02:18.64] Bella-`;

function parseLRC(lrc) {
  return lrc.split("\n")
    .map(line => {
      const m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
      if (!m) return null;
      return {
        time: parseInt(m[1]) * 60 + parseFloat(m[2]),
        text: m[3].trim()
      };
    })
    .filter(Boolean);
}

const lyrics = parseLRC(lrc);

const lineElements = [];
for (let i = 0; i < 3; i++) {
  const div = document.createElement("div");
  div.className = "line";
  lyricsContainer.appendChild(div);
  lineElements.push(div);
}

let lastIndex = -1;

/* 🔥 LYRICS +0.25s */
function updateLyrics() {
  const t = audio.currentTime + 0.25;

  let index = 0;

  for (let i = 0; i < lyrics.length; i++) {
    if (lyrics[i].time > t) {
      index = i - 1;
      break;
    }
  }

  if (index < 0) index = 0;

  const prev = lyrics[index - 1];
  const curr = lyrics[index];
  const next = lyrics[index + 1];

  lineElements[0].className = "line show prev";
  lineElements[1].className = "line show active";
  lineElements[2].className = "line show next";

  lineElements[0].innerHTML = prev ? `<div class="main">${prev.text}</div>` : "";
  lineElements[2].innerHTML = next ? `<div class="main">${next.text}</div>` : "";

  if (curr && index !== lastIndex) {
    lineElements[1].innerHTML = `<div class="main">${curr.text}</div>`;
    lastIndex = index;
  }
}

audio.ontimeupdate = updateLyrics;

/* ▶ START */
let userStarted = false;

playBtn.onclick = () => {
  audio.play();
  userStarted = true;

  const saved = localStorage.getItem("audioTime");
  if (saved) audio.currentTime = parseFloat(saved);

  playBtn.style.opacity = 0;
  playBtn.style.pointerEvents = "none";
};

/* 💾 SAVE TIME */
function saveTime() {
  localStorage.setItem("audioTime", audio.currentTime);
}

/* 📵 PAUSE */
function pauseAudio() {
  saveTime();
  audio.pause();
}

/* ▶ RESUME */
function resumeAudio() {
  const saved = localStorage.getItem("audioTime");

  if (userStarted && saved !== null) {
    audio.currentTime = parseFloat(saved);
    audio.play().catch(() => {});
  }
}

/* 👁 VISIBILITY CONTROL */
document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    pauseAudio();
  } else {
    resumeAudio();
  }
});

/* 🚪 CLOSE PAGE */
window.addEventListener("pagehide", pauseAudio);
window.addEventListener("beforeunload", pauseAudio);

/* 💖 END */
audio.onended = () => {
  localStorage.removeItem("audioTime");

  lyricsContainer.innerHTML = `
    <div style="
      color:white;
      text-align:center;
      font-size:24px;
      animation: fadeInLove 1.2s ease forwards;
    ">
      💖 Te quiero muchísimo
    </div>

    <style>
      @keyframes fadeInLove {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
    </style>
  `;
};

</script>

</body>
</html>
