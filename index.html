<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mi OG Black 💗</title>

<!-- Meta WhatsApp -->
<meta property="og:title" content="Mi OG Black ❤️">
<meta property="og:description" content="Te quiero, Sofía.">
<meta property="og:url" content="https://10nerna.github.io/Mi-OG-Black/">
<meta property="og:image" content="https://10nerna.github.io/Mi-OG-Black/logo.jpg">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    background: #0a0a0a;
    color: #e5e5e5;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden; /* Evita scroll general */
}

.player {
    width: 92%;
    max-width: 380px;
    background: #121212;
    border-radius: 28px;
    padding: 28px 22px 34px;
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9);
    user-select: none;
    position: relative;
}

/* Fondo sólido simple */
.album-art {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: url('sofia.jpg') center/cover no-repeat;
    border-radius: 20px;
    margin-bottom: 24px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.75);
}

.title {
    font-size: 1.85rem;
    font-weight: 700;
    text-align: center;
    margin-bottom: 6px;
    color: #fff;
    letter-spacing: 1.5px;
}

.artist {
    font-size: 1rem;
    text-align: center;
    color: #a0a0a0;
    margin-bottom: 28px;
}

.controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    margin-bottom: 24px;
}

.controls button {
    background: none;
    border: none;
    color: #b3b3b3;
    font-size: 2rem;
    padding: 8px;
    cursor: pointer;
}

.play-pause {
    width: 72px;
    height: 72px;
    background: #fff;
    color: #121212;
    border-radius: 50%;
    font-size: 2.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

.progress-container {
    margin: 0 10px 28px;
}

.progress-bar {
    height: 4px;
    background: #333;
    border-radius: 9999px;
    overflow: hidden;
    cursor: pointer;
}

.progress {
    height: 100%;
    width: 0%;
    background: linear-gradient(to right, #fff, #ddd);
}

.time {
    display: flex;
    justify-content: space-between;
    font-size: 0.82rem;
    color: #777;
    margin-top: 8px;
}

/* Lyrics mejorado - sin scroll automático que mueva toda la página */
.lyrics-container {
    height: 210px;
    overflow-y: auto;
    padding: 10px 16px;
    text-align: center;
    scrollbar-width: thin;
    scrollbar-color: #444 #1f1f1f;
    border-radius: 12px;
    background: rgba(0, 0, 0, 0.3);
}

.lyrics-container::-webkit-scrollbar {
    width: 4px;
}

.lyrics-container::-webkit-scrollbar-thumb {
    background: #444;
    border-radius: 20px;
}

.lyric-line {
    font-size: 1.08rem;
    line-height: 1.75;
    padding: 9px 0;
    color: #888;
    transition: all 0.3s ease;
    min-height: 1.75em;
}

.lyric-line.active {
    color: #ffffff;
    font-weight: 600;
    font-size: 1.18rem;
    text-shadow: 0 0 15px rgba(255,255,255,0.4);
}

/* Mensaje de seek */
#seek-message {
    position: absolute;
    top: -48px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.85);
    color: #fff;
    font-size: 0.82rem;
    padding: 7px 16px;
    border-radius: 20px;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
}

.footer {
    text-align: center;
    margin-top: 14px;
    font-size: 0.78rem;
    color: #555;
}
</style>
</head>

<body>

<div class="player">

    <div class="album-art"></div>

    <div class="title">MI OG BLACK ♡</div>
    <div class="artist">Tu Artista</div>

    <div class="controls">
        <div style="text-align:center;">
            <button id="btn-back">↞</button>
        </div>

        <button class="play-pause" id="play-pause">▶</button>

        <div style="text-align:center;">
            <button id="btn-forward">↠</button>
        </div>
    </div>

    <div id="seek-message"></div>

    <div class="progress-container">
        <div class="progress-bar" id="progressBar">
            <div class="progress" id="progress"></div>
        </div>
        <div class="time">
            <span id="current-time">0:00</span>
            <span id="duration">0:00</span>
        </div>
    </div>

    <!-- Lyrics con scroll interno (no mueve la página) -->
    <div class="lyrics-container" id="lyricsContainer"></div>

    <div class="footer">MI OG BLACK</div>

</div>

<audio id="audio" src="OGBlack.MP3" preload="metadata"></audio>

<script>
const audio = document.getElementById('audio');
const playPauseBtn = document.getElementById('play-pause');
const progress = document.getElementById('progress');
const progressBar = document.getElementById('progressBar');
const currentTimeEl = document.getElementById('current-time');
const durationEl = document.getElementById('duration');
const lyricsContainer = document.getElementById('lyricsContainer');
const seekMessage = document.getElementById('seek-message');

const lrc = `[00:11.70] Te saco a pasear
[00:14.52] En un Banshee robao
[00:18.13] Como OG Black
[00:19.64] Como OG Black
[00:21.24] Como OG Black
[00:24.21] Hacemo' una porno
[00:26.96] En la parte de atrá'
[00:30.68] Como OG Black
[00:32.06] Como OG Black
[00:33.79] Como OG Black
[00:37.17] Que no pare el bellaqueo
[00:38.75] Que no pare el bellaqueo
[00:40.38] Que no pare el bellaqueo
[00:42.14] Que no pare el bellaqueo
[00:43.42] Que no pare el bellaqueo
[00:45.22] Que no pare el bellaqueo
[00:46.58] Que no pare el bellaqueo
[00:48.27] Que no pare el bellaqueo
[00:49.84] Ey, te miro a los ojo' y veo luce'
[00:53.16] Maldito sea el hombre que te use
[00:55.25] Tú-tú te mereces un cangri, tú no estás pa losers
[00:58.34] Que te lleve pa la feria y te gane to los peluche'
[01:01.20] Follow, follow, falo
[01:02.66] Mira lo que caché en el cruce (pa'l cruce)
[01:05.71] Flores, que la poli no me escuche

[01:14.39] Tú tás adelantá, ey
[01:15.92] Tesla Cyber Truck, ey
[01:17.34] Tiene un par atrás, ey
[01:18.92] Father con el Bo
[01:20.32] Tú me tiene' dando vueltas, ya me siento Tony Hawk
[01:23.16] Vestido de Christian Dior, yo le doy gracias a Dios
[01:26.16] Yo te saco a pasear (te saco a pasear)
[01:29.85] En un Banshee robao (en un Banshee robao)
[01:32.71] Como OG Black, yeh
[01:34.67] Como OG Black, yeh
[01:35.92] Como OG Black
[01:38.99] Hacemo' una porno (hacemo' una porno)
[01:42.13] En la parte de atrá' (en la parte de atrá')
[01:45.32] Como OG Black, yeh

[01:48.69] Como OG Black
[01:50.90] ¿Qué, qué, qué?
[01:52.01] Que no pare el bellaqueo
[01:53.72] Que no pare el bellaqueo
[01:55.42] Que no pare el bellaqueo
[01:56.70] Que no pare el bellaqueo
[01:58.29] Que no pare el bellaqueo
[01:59.86] Que no pare el bellaqueo
[02:01.36] Que no pare el bellaqueo
[02:02.74] Que no-no-no (bellaqueo)
[02:06.61] Bella-
[02:10.17] Bellaqueo
[02:12.61] Bella-
[02:15.82] Bellaqueo
[02:18.64] Bella-`;

const lyricsData = lrc.trim().split('\n').map(line => {
    const match = line.match(/\[(\d{2}):(\d{2}\.\d{2})\](.*)/);
    if (match) return {
        time: parseInt(match[1])*60 + parseFloat(match[2]),
        text: match[3].trim()
    };
}).filter(Boolean);

let currentIndex = -1;

function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return `${m}:${s < 10 ? '0' : ''}${s}`;
}

function showSeekMessage(text) {
    seekMessage.textContent = text;
    seekMessage.style.opacity = '1';
    setTimeout(() => seekMessage.style.opacity = '0', 1300);
}

function renderAllLyrics() {
    lyricsContainer.innerHTML = '';
    lyricsData.forEach(line => {
        const div = document.createElement('div');
        div.className = 'lyric-line';
        div.textContent = line.text;
        lyricsContainer.appendChild(div);
    });
}

function updateActiveLine(i) {
    const lines = lyricsContainer.querySelectorAll('.lyric-line');
    lines.forEach((l, idx) => l.classList.toggle('active', idx === i));
    
    if (lines[i]) {
        lines[i].scrollIntoView({
            behavior: 'smooth',
            block: 'center'
        });
    }
}

function seekTo(e) {
    const rect = progressBar.getBoundingClientRect();
    const pos = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const percent = Math.max(0, Math.min(1, pos / rect.width));
    if (audio.duration) audio.currentTime = percent * audio.duration;
}

// Controles
document.getElementById('btn-forward').onclick = () => {
    if (audio.duration) {
        audio.currentTime = Math.min(audio.duration, audio.currentTime + 5);
        showSeekMessage('+5s');
    }
};

document.getElementById('btn-back').onclick = () => {
    audio.currentTime = Math.max(0, audio.currentTime - 5);
    showSeekMessage('-5s');
};

// Pausar cuando se cambia de pestaña o se minimiza la ventana
document.addEventListener('visibilitychange', () => {
    if (document.hidden && !audio.paused) {
        audio.pause();
        playPauseBtn.textContent = '▶';
    }
});

progressBar.addEventListener('click', seekTo);
progressBar.addEventListener('touchstart', seekTo);

audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    
    const percent = (audio.currentTime / audio.duration) * 100;
    progress.style.width = percent + '%';
    currentTimeEl.textContent = formatTime(audio.currentTime);

    const newIndex = lyricsData.findIndex((l, i) =>
        audio.currentTime >= l.time &&
        (i === lyricsData.length - 1 || audio.currentTime < lyricsData[i + 1].time)
    );

    if (newIndex !== -1 && newIndex !== currentIndex) {
        currentIndex = newIndex;
        updateActiveLine(newIndex);
    }
});

audio.addEventListener('loadedmetadata', () => {
    durationEl.textContent = formatTime(audio.duration);
});

playPauseBtn.onclick = () => {
    if (audio.paused) {
        audio.play();
        playPauseBtn.textContent = '❚❚';
    } else {
        audio.pause();
        playPauseBtn.textContent = '▶';
    }
};

// Inicializar
renderAllLyrics();
</script>

</body>
</html>
