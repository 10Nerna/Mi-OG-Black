<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OG Black</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  background: #000;
  color: #fff;
  font-family: 'Inter', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  width: 100%;
  max-width: 420px;
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 20px;
}

.lyrics-container {
  flex: 1;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.lyric {
  position: absolute;
  width: 100%;
  font-size: 26px;
  opacity: 0;
  transform: translateY(30px);
  transition: all 0.3s ease;
}

.lyric.active {
  opacity: 1;
  transform: translateY(0);
  text-shadow: 0 0 20px rgba(255,255,255,0.4);
}

.info {
  text-align: center;
  margin-bottom: 20px;
}

.controls {
  display: flex;
  justify-content: center;
}

button {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: none;
  background: white;
  color: black;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="container">

  <div id="lyricsContainer" class="lyrics-container"></div>

  <div class="info">
    <h2>OG Black</h2>
    <p>Álvaro Díaz & Randy</p>
  </div>

  <div class="controls">
    <button id="playBtn">Play</button>
  </div>

</div>

<audio id="audio" src="OGBlack.MP3"></audio>

<script>
const audio = document.getElementById('audio');
const playBtn = document.getElementById('playBtn');
const container = document.getElementById('lyricsContainer');

// 🔥 LRC SOLO CON TU LETRA

[02:18.64] Bella-`;

// PARSEAR LRC
function parseLRC(lrc) {
  return lrc.split('\n').map(line => {
    const match = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
    if (!match) return null;

    return {
      time: parseInt(match[1]) * 60 + parseFloat(match[2]),
      text: match[3].trim()
    };
  }).filter(Boolean);
}

const lyricsData = parseLRC(lrc);

// CREAR
function createLyrics() {
  container.innerHTML = '';
  lyricsData.forEach(line => {
    const div = document.createElement('div');
    div.className = 'lyric';
    div.textContent = line.text;
    container.appendChild(div);
  });
}

// UPDATE
function updateLyrics(time) {
  let index = 0;

  for (let i = lyricsData.length - 1; i >= 0; i--) {
    if (time >= lyricsData[i].time) {
      index = i;
      break;
    }
  }

  document.querySelectorAll('.lyric').forEach((line, i) => {
    line.classList.toggle('active', i === index);
  });
}

// LOOP SUAVE
function loop() {
  if (!audio.paused) {
    updateLyrics(audio.currentTime);
  }
  requestAnimationFrame(loop);
}
loop();

// PLAY
playBtn.onclick = () => {
  if (audio.paused) {
    audio.play();
    playBtn.textContent = "Pause";
  } else {
    audio.pause();
    playBtn.textContent = "Play";
  }
};

createLyrics();
</script>
