<body>

    <audio id="audio" src="OGBlack.MP3" preload="metadata"></audio>

    <script>
        const audio = document.getElementById('audio');
        const playPauseBtn = document.getElementById('play-pause');
        const progress = document.getElementById('progress');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');
        const lyricsContainer = document.getElementById('lyricsContainer');
        const seekMessage = document.getElementById('seek-message');

        const lrc = `[00:11.70] Te saco a pasear

[01:26.16] Yo te saco a pasear (te saco a pasear)

[01:50.90] ВїQuГ©, quГ©, quГ©?
[01:52.01] Que no pare el bellaqueo

[02:01.36] Que no pare el bellaqueo
[02:02.74] Que no-no-no (bellaqueo)
[02:06.61] Bella-
[02:10.17] Bellaqueo
[02:12.61] Bella-
[02:15.82] Bellaqueo
[02:18.64] Bella-`;

        const lyricsData = lrc.trim().split('\n').map(line => {
            const match = line.match(/\[(\d{2}):(\d{2}\.\d{2})\](.*)/);
            if (match) return { time: parseInt(match[1])*60 + parseFloat(match[2]), text: match[3].trim() };
            return null;
        }).filter(Boolean);

        let currentIndex = -1;

        function formatTime(sec) {
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function showSeekMessage(text) {
            seekMessage.textContent = text;
            seekMessage.style.opacity = '1';
            setTimeout(() => {
                seekMessage.style.opacity = '0';
            }, 1300);
        }

        function renderAllLyrics() {
            lyricsContainer.innerHTML = '';
            lyricsData.forEach((line) => {
                const div = document.createElement('div');
                div.className = 'lyric-line';
                div.textContent = line.text;
                lyricsContainer.appendChild(div);
            });
        }

        function updateActiveLine(newIndex) {
            const lines = lyricsContainer.querySelectorAll('.lyric-line');
            lines.forEach((line, i) => line.classList.toggle('active', i === newIndex));
            if (lines[newIndex]) {
                lines[newIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function seekTo(e) {
            const rect = progressBar.getBoundingClientRect();
            const pos = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const percent = Math.max(0, Math.min(1, pos / rect.width));
            if (audio.duration) audio.currentTime = percent * audio.duration;
        }

        progressBar.addEventListener('click', seekTo);
        progressBar.addEventListener('touchstart', seekTo);

        document.getElementById('btn-forward').addEventListener('click', () => {
            if (audio.duration) {
                audio.currentTime = Math.min(audio.duration, audio.currentTime + 5);
                showSeekMessage('+5 segundos');
            }
        });

        document.getElementById('btn-back').addEventListener('click', () => {
            audio.currentTime = Math.max(0, audio.currentTime - 5);
            showSeekMessage('-5 segundos');
        });

        audio.addEventListener('timeupdate', () => {
            const percent = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
            progress.style.width = percent + '%';
            currentTimeEl.textContent = formatTime(audio.currentTime);

            const newIndex = lyricsData.findIndex((line, i) => 
                audio.currentTime >= line.time && (i === lyricsData.length - 1 || audio.currentTime < lyricsData[i + 1].time)
            );

            if (newIndex !== -1 && newIndex !== currentIndex) {
                currentIndex = newIndex;
                updateActiveLine(newIndex);
            }
        });

        audio.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(audio.duration);
        });

        playPauseBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playPauseBtn.textContent = 'вќљвќљ';
            } else {
                audio.pause();
                playPauseBtn.textContent = 'в–¶';
            }
        });

        // Pausar al salir de la pestaГ±a
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden' && !audio.paused) {
                audio.pause();
                playPauseBtn.textContent = 'в–¶';
            }
        });

        window.addEventListener('pagehide', () => {
            if (!audio.paused) {
                audio.pause();
                playPauseBtn.textContent = 'в–¶';
            }
        });

        renderAllLyrics();
    </script>
</body>
