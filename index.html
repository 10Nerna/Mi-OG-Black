@font-face {
  font-family: 'CandyBeans';

body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: 'CandyBeans', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
}

/* FONDO */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image: url('fondo.jpg');
  background-repeat: repeat;
  background-size: 450px;
  opacity: 0.6;
  filter: contrast(1.3) brightness(0.9);
  transform: scale(1.35);
  animation: moveBg 25s ease-in-out infinite alternate;
  z-index: 0;
}

@keyframes moveBg {
  0% { background-position: 0 0; transform: scale(1.32); }
  100% { background-position: 220px 420px; transform: scale(1.42); }
}

/* OVERLAY */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, rgba(0,0,0,0.25), rgba(0,0,0,0.88));
  z-index: 1;
}

/* CONTENEDOR */
.container {
  position: relative;
  z-index: 3;
  width: 100%;
  max-width: 420px;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.lyrics {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  padding: 0 15px;
}

/* ANIMACIONES */
.line {
  text-align: center;
  opacity: 0;
  transform: translateY(25px) scale(0.92);
  filter: blur(5px);
  transition: all 0.5s ease;
}

.line.show {
  opacity: 1;
  transform: translateY(0) scale(1);
  filter: blur(0);
}

.line.active {
  color: white;
  transform: scale(1.15);
  text-shadow: 0 0 15px rgba(255,255,255,0.5),
               0 0 40px rgba(255,255,255,0.2);
}

.line.prev,
.line.next {
  color: rgba(255,255,255,0.55);
  transform: scale(0.95);
  filter: blur(1px);
}

.main {
  font-size: clamp(13px, 4.1vw, 26px);
}

/* BOTÓN */

  font-family: inherit;

function parseLRC(lrc) {
  return lrc.split("\n").map(line => {
    const m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
    if (!m) return null;
    return {
      time: parseInt(m[1]) * 60 + parseFloat(m[2]),
      text: m[3].trim()
    };
  }).filter(Boolean);
}

const lyrics = parseLRC(lrc);

const lineElements = [];
for (let i = 0; i < 3; i++) {
  const div = document.createElement("div");
  div.className = "line";
  lyricsContainer.appendChild(div);
  lineElements.push(div);
}

let lastIndex = -1;

function updateLyrics() {
  const t = audio.currentTime + 0.25;

  let index = 0;

  for (let i = 0; i < lyrics.length; i++) {
    if (lyrics[i].time > t) {
      index = i - 1;
      break;
    }
  }

  if (index < 0) index = 0;

  if (index === lastIndex) return;
  lastIndex = index;

  const prev = lyrics[index - 1];
  const curr = lyrics[index];
  const next = lyrics[index + 1];

  lineElements[0].className = "line show prev";
  lineElements[1].className = "line show active";
  lineElements[2].className = "line show next";

  lineElements[0].innerHTML = prev ? `<div class="main">${prev.text}</div>` : "";
  lineElements[1].innerHTML = curr ? `<div class="main">${curr.text}</div>` : "";
  lineElements[2].innerHTML = next ? `<div class="main">${next.text}</div>` : "";
}

audio.ontimeupdate = updateLyrics;

/* PLAY */
playBtn.onclick = () => {
  audio.play();
  playBtn.style.display = "none";
};

/* VISIBILITY */
document.addEventListener("visibilitychange", () => {
  if (document.hidden) audio.pause();
  else audio.play().catch(()=>{});

/* FINAL */

};
