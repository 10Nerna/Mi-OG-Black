<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG Black</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a1a, #2d2d2d);
            color: #e5e5e5;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .player {
            width: 100%;
            max-width: 460px;
            background: rgba(30, 30, 30, 0.95);
            border-radius: 24px;
            padding: 30px 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        .album-art {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: url('sofia.jpg') center/cover no-repeat;
            border-radius: 18px;
            margin-bottom: 25px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
        }

        .title {
            font-size: 1.7rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
            color: #f0f0f0;
        }

        .artist {
            text-align: center;
            color: #a0a0a0;
            margin-bottom: 30px;
        }

        .progress-container {
            margin: 20px 0 35px;
        }

        .progress-bar {
            height: 5px;
            background: #444;
            border-radius: 9999px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            width: 0%;
            background: #888;
            transition: width 0.2s linear;
        }

        .time {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #888;
            margin-top: 6px;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        .controls button {
            background: none;
            border: none;
            color: #ccc;
            font-size: 1.8rem;
            cursor: pointer;
        }

        .play-pause {
            width: 66px;
            height: 66px;
            background: #666;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 2.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }

        /* === LYRICS ESTILO SPOTIFY === */
        .lyrics-container {
            height: 220px;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 10px 0;
            margin: 20px 0;
            scrollbar-width: none; /* oculta scrollbar en firefox */
        }

        .lyrics-container::-webkit-scrollbar {
            display: none;
        }

        .lyric-line {
            text-align: center;
            font-size: 1.22rem;
            line-height: 1.65;
            padding: 6px 20px;
            color: #888;
            transition: all 0.4s ease;
            opacity: 0.75;
            margin: 4px 0;
        }

        .lyric-line.active {
            color: #ffffff;
            font-weight: 600;
            font-size: 1.32rem;
            opacity: 1;
            transform: scale(1.02);
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #777;
        }
    </style>
</head>
<body>

    <div class="player">
        <div class="album-art"></div>
        
        <div class="title">OG Black</div>
        <div class="artist">Tu Artista</div>

        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
            <div class="time">
                <span id="current-time">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="controls">
            <button>⇄</button>
            <button>⫻</button>
            <button class="play-pause" id="play-pause">▶</button>
            <button>⫻</button>
            <button>⟳</button>
        </div>

        <div class="lyrics-container" id="lyricsContainer"></div>

        <div class="footer">OG Black</div>
    </div>

    <audio id="audio" src="OGBlack.MP3" preload="metadata"></audio>

    <script>
        const audio = document.getElementById('audio');
        const playPauseBtn = document.getElementById('play-pause');
        const progress = document.getElementById('progress');
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');
        const lyricsContainer = document.getElementById('lyricsContainer');

        const lrc = `[00:11.70] Te saco a pasear
[00:14.52] En un Banshee robao
[00:18.13] Como OG Black
[00:19.64] Como OG Black
[00:21.24] Como OG Black
[00:24.21] Hacemo' una porno
[00:26.96] En la parte de atrá'
[00:30.68] Como OG Black
[00:32.06] Como OG Black
[00:33.79] Como OG Black
[00:37.17] Que no pare el bellaqueo
[00:38.75] Que no pare el bellaqueo
[00:40.38] Que no pare el bellaqueo
[00:42.14] Que no pare el bellaqueo
[00:43.42] Que no pare el bellaqueo
[00:45.22] Que no pare el bellaqueo
[00:46.58] Que no pare el bellaqueo
[00:48.27] Que no pare el bellaqueo
[00:49.84] Ey, te miro a los ojo' y veo luce'
[00:53.16] Maldito sea el hombre que te use
[00:55.25] Tú-tú te mereces un cangri, tú no estás pa losers
[00:58.34] Que te lleve pa la feria y te gane to los peluche'
[01:01.20] Follow, follow, falo
[01:02.66] Mira lo que caché en el cruce (pa'l cruce)
[01:05.71] Flores, que la poli no me escuche
[01:07.78] Tú tienes lo tuyo y eso hace que me enmuse
[01:11.03] Te cargo to los paquete' si haces compra' en el super, ey
[01:14.39] Tú tás adelantá, ey
[01:15.92] Tesla Cyber Truck, ey
[01:17.34] Tiene un par atrás, ey
[01:18.92] Father con el Bo
[01:20.32] Tú me tiene' dando vueltas, ya me siento Tony Hawk
[01:23.16] Vestido de Christian Dior, yo le doy gracias a Dios
[01:26.16] Yo te saco a pasear (te saco a pasear)
[01:29.85] En un Banshee robao (en un Banshee robao)
[01:32.71] Como OG Black, yeh
[01:34.67] Como OG Black, yeh
[01:35.92] Como OG Black
[01:38.99] Hacemo' una porno (hacemo' una porno)
[01:42.13] En la parte de atrá' (en la parte de atrá')
[01:45.32] Como OG Black, yeh
[01:46.97] Como OG Black, yeh
[01:48.69] Como OG Black
[01:50.90] ¿Qué, qué, qué?
[01:52.01] Que no pare el bellaqueo
[01:53.72] Que no pare el bellaqueo
[01:55.42] Que no pare el bellaqueo
[01:56.70] Que no pare el bellaqueo
[01:58.29] Que no pare el bellaqueo
[01:59.86] Que no pare el bellaqueo
[02:01.36] Que no pare el bellaqueo
[02:02.74] Que no-no-no (bellaqueo)
[02:06.61] Bella-
[02:10.17] Bellaqueo
[02:12.61] Bella-
[02:15.82] Bellaqueo
[02:18.64] Bella-`;

        const lyricsData = lrc.trim().split('\n').map(line => {
            const match = line.match(/\[(\d{2}):(\d{2}\.\d{2})\](.*)/);
            if (match) {
                return {
                    time: parseInt(match[1]) * 60 + parseFloat(match[2]),
                    text: match[3].trim()
                };
            }
            return null;
        }).filter(Boolean);

        let currentIndex = -1;

        function formatTime(sec) {
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function renderAllLyrics() {
            lyricsContainer.innerHTML = '';
            lyricsData.forEach((line, i) => {
                const div = document.createElement('div');
                div.className = 'lyric-line';
                div.textContent = line.text;
                div.dataset.index = i;
                lyricsContainer.appendChild(div);
            });
        }

        function updateActiveLine(newIndex) {
            const lines = lyricsContainer.querySelectorAll('.lyric-line');
            lines.forEach((line, i) => {
                if (i === newIndex) {
                    line.classList.add('active');
                    // Scroll suave hacia la línea activa
                    line.scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else {
                    line.classList.remove('active');
                }
            });
        }

        audio.addEventListener('timeupdate', () => {
            const percent = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
            progress.style.width = percent + '%';
            currentTimeEl.textContent = formatTime(audio.currentTime);

            const newIndex = lyricsData.findIndex((line, i) => 
                audio.currentTime >= line.time && (i === lyricsData.length - 1 || audio.currentTime < lyricsData[i + 1].time)
            );

            if (newIndex !== -1 && newIndex !== currentIndex) {
                currentIndex = newIndex;
                updateActiveLine(newIndex);
            }
        });

        audio.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(audio.duration);
        });

        playPauseBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playPauseBtn.textContent = '❚❚';
            } else {
                audio.pause();
                playPauseBtn.textContent = '▶';
            }
        });

        // Render inicial de todas las letras
        renderAllLyrics();

        // Auto-play en primer toque
        document.addEventListener('click', () => {
            if (audio.paused) audio.play();
        }, { once: true });
    </script>
</body>
</html>
