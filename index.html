<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

body {
    margin: 0;

    min-height: 100vh; /* ✅ mejor compatibilidad */
    background: #0f0f0f;
    color: #e5e5e5;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* ✅ Ajuste real de tamaño */
.player {
    width: 92%;
    max-width: 380px;
    background: #121212;
    border-radius: 28px;
    padding: 28px 22px 34px;
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9);
    user-select: none;
}

.album-art {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: url('sofia.jpg') center/cover no-repeat;
    border-radius: 20px;
    margin-bottom: 24px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.75);
}

/* ✅ TEXTO NORMAL (fix importante) */
.title {
    font-size: 1.9rem;
    font-weight: 700;
    text-align: center;
    margin-bottom: 6px;
    color: #fff;
    letter-spacing: 2px;
}

.artist {
    font-size: 1rem;
    text-align: center;
    color: #a0a0a0;
    margin-bottom: 26px;
}

.controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    margin-bottom: 24px;
    position: relative;
}

.controls button {
    background: none;
    border: none;
    color: #b3b3b3;
    font-size: 2rem;
    padding: 8px;
}

.control-label {
    font-size: 0.7rem;
    color: #777;
    margin-top: 4px;
    text-align: center;
}

.play-pause {
    width: 70px;
    height: 70px;
    background: #fff;
    color: #121212;
    border-radius: 50%;
    font-size: 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
}

.progress-container {
    margin: 0 10px 28px;
}

.progress-bar {
    height: 4px;
    background: #333;
    border-radius: 9999px;
    overflow: hidden;
    cursor: pointer;
}

.progress {
    height: 100%;
    width: 0%;
    background: #fff;
}

.time {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: #777;
    margin-top: 8px;
}

.lyrics-container {
    height: 240px;
    overflow-y: auto;
    padding: 6px 12px;
    text-align: center;
    scrollbar-width: none;
}

.lyrics-container::-webkit-scrollbar {
    display: none;
}

.lyric-line {
    font-size: 1.1rem;
    line-height: 1.7;
    padding: 8px 0;
    color: #888;
    transition: 0.3s;
}

.lyric-line.active {
    color: #fff;
    font-weight: 600;
    font-size: 1.2rem;
}

.footer {
    text-align: center;
    margin-top: 10px;
    font-size: 0.8rem;
    color: #555;
}

/* mensaje */
#seek-message {
    position: absolute;
    top: -45px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    color: #fff;
    font-size: 0.8rem;
    padding: 6px 14px;
    border-radius: 20px;
    opacity: 0;
    transition: 0.3s;
}
</style>
</head>

<body>

<div class="player">

    <div class="album-art"></div>

    <!-- ✅ FIX -->
    <div class="title">MI OG BLACK ♡</div>
    <div class="artist">Tu Artista</div>

    <div class="controls">
        <div style="text-align:center;">
            <button id="btn-back">↞</button>
            <div class="control-label">Retroceder</div>
        </div>

        <button class="play-pause" id="play-pause">▶</button>

        <div style="text-align:center;">
            <button id="btn-forward">↠</button>
            <div class="control-label">Adelantar</div>
        </div>
    </div>

    <div id="seek-message"></div>

    <div class="progress-container">
        <div class="progress-bar" id="progressBar">
            <div class="progress" id="progress"></div>
        </div>
        <div class="time">
            <span id="current-time">0:00</span>
            <span id="duration">0:00</span>
        </div>
    </div>

    <div class="lyrics-container" id="lyricsContainer"></div>

    <div class="footer">MI OG BLACK</div>

</div>

<audio id="audio" src="OGBlack.MP3" preload="metadata"></audio>

const playPauseBtn = document.getElementById('play-pause');

const currentTimeEl = document.getElementById('current-time');

const seekMessage = document.getElementById('seek-message');

/* === TU LÓGICA ORIGINAL === */
const lyricsData = lrc.trim().split('\n').map(line => {
    const match = line.match(/\[(\d{2}):(\d{2}\.\d{2})\](.*)/);
    if (match) return {
        time: parseInt(match[1])*60 + parseFloat(match[2]),
        text: match[3].trim()
    };
}).filter(Boolean);

let currentIndex = -1;

function formatTime(sec){
    const m = Math.floor(sec/60);
    const s = Math.floor(sec%60);
    return `${m}:${s<10?'0':''}${s}`;
}

function showSeekMessage(text){
    seekMessage.textContent = text;
    seekMessage.style.opacity = '1';
    setTimeout(()=> seekMessage.style.opacity='0',1200);
}

function renderAllLyrics(){
    lyricsContainer.innerHTML='';
    lyricsData.forEach(line=>{
        const div=document.createElement('div');
        div.className='lyric-line';
        div.textContent=line.text;
        lyricsContainer.appendChild(div);
    });
}

function updateActiveLine(i){
    const lines = lyricsContainer.querySelectorAll('.lyric-line');
    lines.forEach((l,idx)=>l.classList.toggle('active', idx===i));
    if(lines[i]){
        lines[i].scrollIntoView({behavior:'smooth',block:'center'});
    }
}

function seekTo(e){
    const rect=progressBar.getBoundingClientRect();
    const pos=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
    const percent=Math.max(0,Math.min(1,pos/rect.width));
    if(audio.duration) audio.currentTime=percent*audio.duration;
}

progressBar.addEventListener('click',seekTo);
progressBar.addEventListener('touchstart',seekTo);

document.getElementById('btn-forward').onclick=()=>{
    audio.currentTime+=5;
    showSeekMessage('+5s');
};

document.getElementById('btn-back').onclick=()=>{
    audio.currentTime-=5;
    showSeekMessage('-5s');
};

audio.addEventListener('timeupdate',()=>{
    const percent=(audio.currentTime/audio.duration)*100;
    progress.style.width=percent+'%';
    currentTimeEl.textContent=formatTime(audio.currentTime);

    const newIndex=lyricsData.findIndex((l,i)=>
        audio.currentTime>=l.time &&
        (i===lyricsData.length-1 || audio.currentTime<lyricsData[i+1].time)
    );

    if(newIndex!==-1 && newIndex!==currentIndex){
        currentIndex=newIndex;
        updateActiveLine(newIndex);
    }
});

audio.addEventListener('loadedmetadata',()=>{
    durationEl.textContent=formatTime(audio.duration);
});

playPauseBtn.onclick=()=>{
    if(audio.paused){
        audio.play();
        playPauseBtn.textContent='❚❚';
    }else{
        audio.pause();
        playPauseBtn.textContent='▶';
    }
};

renderAllLyrics();
</script>
