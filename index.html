<!DOCTYPE html>
<html lang="es">
<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: #0f0f0f;
            color: #e5e5e5;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: manipulation;
        }

        .player {
            width: 100%;
            max-width: 420px;
            background: #121212;
            border-radius: 28px;
            padding: 30px 20px 40px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9);
            user-select: none;
        }

        .album-art {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: url('sofia.jpg') center/cover no-repeat;
            border-radius: 18px;
            margin-bottom: 28px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
        }

        .title {
            font-size: 1.85rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 4px;
            color: #ffffff;
        }

        .artist {
            font-size: 1.05rem;
            text-align: center;
            color: #a0a0a0;
            margin-bottom: 32px;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 50px;
            margin-bottom: 30px;
        }

        .controls button {
            background: none;
            border: none;
            color: #b3b3b3;
            font-size: 2.2rem;
            cursor: pointer;
            padding: 8px;
        }

        .play-pause {
            width: 68px;
            height: 68px;
            background: #ffffff;
            color: #121212;
            border: none;
            border-radius: 50%;
            font-size: 2.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.25);
        }

        .progress-container {
            margin: 0 10px 35px;
        }

        .progress-bar {
            height: 4px;
            background: #333;
            border-radius: 9999px;
            overflow: hidden;
            cursor: pointer;
        }

        .progress {
            height: 100%;
            width: 0%;
            background: #ffffff;
            transition: width 0.1s linear;
        }

        .time {
            display: flex;
            justify-content: space-between;
            font-size: 0.82rem;
            color: #777;
            margin-top: 6px;
        }

        .lyrics-container {
            height: 260px;
            overflow-y: auto;
            padding: 10px 15px;
            text-align: center;
            scrollbar-width: none;
        }

        .lyrics-container::-webkit-scrollbar {
            display: none;
        }

        .lyric-line {
            font-size: 1.18rem;
            line-height: 1.7;
            padding: 8px 0;
            color: #888;
            transition: all 0.4s ease;
        }

        .lyric-line.active {
            color: #ffffff;
            font-weight: 600;
            font-size: 1.28rem;
        }

        .footer {
            text-align: center;
            margin-top: 15px;
            font-size: 0.85rem;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="player">
        <div class="album-art"></div>
        
        <div class="title">ᴍɪ ᴏɢ ʙʟᴀᴄᴋ ღ</div>
        <div class="artist">Tu Artista</div>

        <div class="controls">
            <button id="btn-back">↞</button>
            <button class="play-pause" id="play-pause">▶</button>
            <button id="btn-forward">↠</button>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar">
                <div class="progress" id="progress"></div>
            </div>
            <div class="time">
                <span id="current-time">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="lyrics-container" id="lyricsContainer"></div>

        <div class="footer">ᴍɪ ᴏɢ ʙʟᴀᴄᴋ</div>
    </div>

    <audio id="audio" src="OGBlack.MP3" preload="metadata"></audio>

    <script>
        // (El script se mantiene exactamente igual que el tuyo)
        const audio = document.getElementById('audio');
        const playPauseBtn = document.getElementById('play-pause');
        const progress = document.getElementById('progress');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');
        const lyricsContainer = document.getElementById('lyricsContainer');

        const lrc = `[00:11.70] Te saco a pasear
[00:14.52] En un Banshee robao
[00:18.13] Como OG Black
[00:19.64] Como OG Black
[00:21.24] Como OG Black
[00:24.21] Hacemo' una porno
[00:26.96] En la parte de atrá'
[00:30.68] Como OG Black
[00:32.06] Como OG Black
[00:33.79] Como OG Black
[00:37.17] Que no pare el bellaqueo
[00:38.75] Que no pare el bellaqueo
[00:40.38] Que no pare el bellaqueo
[00:42.14] Que no pare el bellaqueo
[00:43.42] Que no pare el bellaqueo
[00:45.22] Que no pare el bellaqueo
[00:46.58] Que no pare el bellaqueo
[00:48.27] Que no pare el bellaqueo
[00:49.84] Ey, te miro a los ojo' y veo luce'
[00:53.16] Maldito sea el hombre que te use
[00:55.25] Tú-tú te mereces un cangri, tú no estás pa losers

[01:01.20] Follow, follow, falo
[01:02.66] Mira lo que caché en el cruce (pa'l cruce)
[01:05.71] Flores, que la poli no me escuche
[01:07.78] Tú tienes lo tuyo y eso hace que me enmuse
[01:11.03] Te cargo to los paquete' si haces compra' en el super, ey
[01:14.39] Tú tás adelantá, ey

[01:17.34] Tiene un par atrás, ey
[01:18.92] Father con el Bo
[01:20.32] Tú me tiene' dando vueltas, ya me siento Tony Hawk
[01:23.16] Vestido de Christian Dior, yo le doy gracias a Dios
[01:26.16] Yo te saco a pasear (te saco a pasear)
[01:29.85] En un Banshee robao (en un Banshee robao)
[01:32.71] Como OG Black, yeh

[01:45.32] Como OG Black, yeh

[01:50.90] ¿Qué, qué, qué?
[01:52.01] Que no pare el bellaqueo
[01:53.72] Que no pare el bellaqueo
[01:55.42] Que no pare el bellaqueo
[01:56.70] Que no pare el bellaqueo
[01:58.29] Que no pare el bellaqueo
[01:59.86] Que no pare el bellaqueo
[02:01.36] Que no pare el bellaqueo
[02:02.74] Que no-no-no (bellaqueo)
[02:06.61] Bella-
[02:10.17] Bellaqueo
[02:12.61] Bella-
[02:15.82] Bellaqueo
[02:18.64] Bella-`;

        const lyricsData = lrc.trim().split('\n').map(line => {
            const match = line.match(/\[(\d{2}):(\d{2}\.\d{2})\](.*)/);
            if (match) return { time: parseInt(match[1])*60 + parseFloat(match[2]), text: match[3].trim() };
            return null;
        }).filter(Boolean);

        let currentIndex = -1;

        function formatTime(sec) {
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function renderAllLyrics() {
            lyricsContainer.innerHTML = '';
            lyricsData.forEach((line, i) => {
                const div = document.createElement('div');
                div.className = 'lyric-line';
                div.textContent = line.text;
                lyricsContainer.appendChild(div);
            });
        }

        function updateActiveLine(newIndex) {
            const lines = lyricsContainer.querySelectorAll('.lyric-line');
            lines.forEach((line, i) => line.classList.toggle('active', i === newIndex));
            if (lines[newIndex]) lines[newIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function seekTo(e) {
            const rect = progressBar.getBoundingClientRect();
            const pos = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const percent = Math.max(0, Math.min(1, pos / rect.width));
            if (audio.duration) audio.currentTime = percent * audio.duration;
        }

        progressBar.addEventListener('click', seekTo);
        progressBar.addEventListener('touchstart', (e) => { seekTo(e); });

        document.getElementById('btn-forward').addEventListener('click', () => {
            if (audio.duration) audio.currentTime = Math.min(audio.duration, audio.currentTime + 5);
        });
        document.getElementById('btn-back').addEventListener('click', () => {
            audio.currentTime = Math.max(0, audio.currentTime - 5);
        });

        audio.addEventListener('timeupdate', () => {
            const percent = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
            progress.style.width = percent + '%';
            currentTimeEl.textContent = formatTime(audio.currentTime);

            const newIndex = lyricsData.findIndex((line, i) => 
                audio.currentTime >= line.time && (i === lyricsData.length - 1 || audio.currentTime < lyricsData[i + 1].time)
            );

            if (newIndex !== -1 && newIndex !== currentIndex) {
                currentIndex = newIndex;
                updateActiveLine(newIndex);
            }
        });

        audio.addEventListener('loadedmetadata', () => durationEl.textContent = formatTime(audio.duration));

        playPauseBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playPauseBtn.textContent = '❚❚';
            } else {
                audio.pause();
                playPauseBtn.textContent = '▶';
            }
        });

        renderAllLyrics();

        document.addEventListener('click', () => { if (audio.paused) audio.play(); }, { once: true });
    </script>
</body>
</html>
