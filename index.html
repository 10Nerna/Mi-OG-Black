function parseLRC(lrc){
  return lrc.split("\n").map(l=>{
    const m=l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
    if(!m) return null;
    return {time:+m[1]*60+parseFloat(m[2]),text:m[3]};
  }).filter(Boolean);
}

const lyrics=parseLRC(lrc);

const lines=[];
for(let i=0;i<3;i++){
  const d=document.createElement("div");
  d.className="line";
  lyricsContainer.appendChild(d);
  lines.push(d);
}

let last=-1;

function update(){
  const t=audio.currentTime;

  let i=0;
  for(let j=0;j<lyrics.length;j++){
    if(lyrics[j].time>t){i=j-1;break;}
  }
  if(i<0)i=0;

  const prev=lyrics[i-1];
  const curr=lyrics[i];
  const next=lyrics[i+1];

  lines[0].className="line show";
  lines[1].className="line active";
  lines[2].className="line show";

  lines[0].innerHTML=prev?`<div class="main">${prev.text}</div>`:"";
  lines[1].innerHTML=curr?`<div class="main">${curr.text}</div>`:"";
  lines[2].innerHTML=next?`<div class="main">${next.text}</div>`:"";
}

audio.ontimeupdate=update;

/* PLAY */
playBtn.onclick=()=>{
  audio.play();
  playBtn.style.display="none";
};

document.addEventListener("visibilitychange",()=>{
