<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

@font-face {
  font-family: 'CandyBeans';
  src: url('./CandyBeans.otf') format('opentype');
}

body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: black;
  font-family: 'CandyBeans', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 🔥 FONDO */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url('fondo.jpg') center/cover no-repeat;
  opacity: 0.65;
  filter: contrast(1.15) brightness(0.85);
  animation: zoomBg 30s ease-in-out infinite alternate;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0.9));
}

@keyframes zoomBg {
  0% { transform: scale(1); }
  100% { transform: scale(1.1); }
}

/* 💖 PARTICULAS (NO EMOJIS) */
#hearts {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 1;
}

.heart {
  position: absolute;
  bottom: -50px;
  width: 10px;
  height: 10px;
  background: rgba(255,255,255,0.9);
  border-radius: 50%;
  filter: blur(2px);
  box-shadow: 0 0 12px rgba(255,255,255,0.8);
  animation: floatUp linear forwards;
  opacity: 0.8;
}

@keyframes floatUp {
  0% {
    transform: translateY(0) scale(0.6);
    opacity: 0;
  }
  20% { opacity: 0.8; }
  100% {
    transform: translateY(-110vh) scale(1.3);
    opacity: 0;
  }
}

.container {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 420px;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.lyrics {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.line {
  text-align: center;
  opacity: 0;
  transform: translateY(25px) scale(0.92);
  filter: blur(5px);
  transition: all 0.5s ease;
}

.line.show {
  opacity: 1;
  transform: translateY(0) scale(1);
  filter: blur(0);
}

.line.active {
  color: white;
  transform: scale(1.15);
  text-shadow:
    0 0 15px rgba(255,255,255,0.5),
    0 0 40px rgba(255,255,255,0.2);
}

.line.prev,
.line.next {
  color: rgba(255,255,255,0.55);
  transform: scale(0.95);
  filter: blur(1px);
}

.main { font-size: 30px; }
.sub { font-size: 16px; opacity: 0.65; }

@keyframes pop {
  0% { transform: scale(0.85); }
  60% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

.pop {
  animation: pop 0.35s ease;
}

button {
  position: absolute;
  bottom: 35px;
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(12px);
  color: white;
  font-size: 22px;
  z-index: 3;
}

</style>
</head>

<body>

<!-- 💖 partículas -->
<div id="hearts"></div>

<div class="container">
  <div id="lyrics" class="lyrics"></div>
  <button id="playBtn">▶</button>
</div>

<audio id="audio" src="OGBlack.MP3"></audio>

<script>

const audio = document.getElementById('audio');
const lyricsContainer = document.getElementById('lyrics');
const playBtn = document.getElementById('playBtn');
const hearts = document.getElementById('hearts');

/* 💖 partículas suaves tipo luz */
function spawnHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (4 + Math.random() * 4) + "s";
  heart.style.width = (6 + Math.random() * 6) + "px";
  heart.style.height = heart.style.width;
  heart.style.opacity = Math.random() * 0.8 + 0.2;

  hearts.appendChild(heart);

  setTimeout(() => heart.remove(), 8000);
}

setInterval(spawnHeart, 180);

/* 🔥 LYRICS COMPLETO (NO TOCADO) */
const lrc = `[00:11.70] Te saco a pasear
[00:14.52] En un Banshee robao
[00:18.13] Como OG Black
[00:19.64] Como OG Black
[00:21.24] Como OG Black
[00:24.21] Hacemo' una porno
[00:26.96] En la parte de atrá'
[00:30.68] Como OG Black
[00:32.06] Como OG Black
[00:33.79] Como OG Black
[00:37.17] Que no pare el bellaqueo
[00:38.75] Que no pare el bellaqueo
[00:40.38] Que no pare el bellaqueo
[00:42.14] Que no pare el bellaqueo
[00:43.42] Que no pare el bellaqueo
[00:45.22] Que no pare el bellaqueo
[00:46.58] Que no pare el bellaqueo
[00:48.27] Que no pare el bellaqueo
[00:49.84] Ey, te miro a los ojo' y veo luce'
[00:53.16] Maldito sea el hombre que te use
[00:55.25] Tú-tú te mereces un cangri, tú no estás pa losers
[00:58.34] Que te lleve pa la feria y te gane to los peluche'
[01:01.20] Follow, follow, falo
[01:02.66] Mira lo que caché en el cruce (pa'l cruce)
[01:05.71] Flores, que la poli no me escuche
[01:07.78] Tú tienes lo tuyo y eso hace que me enmuse
[01:11.03] Te cargo to los paquete' si haces compra' en el super, ey
[01:14.39] Tú tás adelantá, ey

[01:17.34] Tiene un par atrás, ey

[01:20.32] Tú me tiene' dando vueltas, ya me siento Tony Hawk
[01:23.16] Vestido de Christian Dior, yo le doy gracias a Dios
[01:26.16] Yo te saco a pasear (te saco a pasear)
[01:29.85] En un Banshee robao (en un Banshee robao)
[01:32.71] Como OG Black, yeh
[01:34.67] Como OG Black, yeh
[01:35.92] Como OG Black
[01:38.99] Hacemo' una porno (hacemo' una porno)
[01:42.13] En la parte de atrá' (en la parte de atrá')
[01:45.32] Como OG Black, yeh
[01:46.97] Como OG Black, yeh
[01:48.69] Como OG Black
[01:50.90] ¿Qué, qué, qué?
[01:52.01] Que no pare el bellaqueo
[01:53.72] Que no pare el bellaqueo
[01:55.42] Que no pare el bellaqueo
[01:56.70] Que no pare el bellaqueo
[01:58.29] Que no pare el bellaqueo
[01:59.86] Que no pare el bellaqueo
[02:01.36] Que no pare el bellaqueo
[02:02.74] Que no-no-no (bellaqueo)
[02:06.61] Bella-
[02:10.17] Bellaqueo
[02:12.61] Bella-
[02:15.82] Bellaqueo
[02:18.64] Bella-`;

function parseLRC(lrc) {
  return lrc.split("\n").map(line => {
    const m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
    return {
      time: parseInt(m[1]) * 60 + parseFloat(m[2]),
      text: m[3].trim()
    };
  });
}

const lyrics = parseLRC(lrc);

const lineElements = [];
for (let i = 0; i < 3; i++) {
  const div = document.createElement("div");
  div.className = "line";
  lyricsContainer.appendChild(div);
  lineElements.push(div);
}

let lastIndex = -1;

function updateLyrics() {
  let index = 0;

  for (let i = lyrics.length - 1; i >= 0; i--) {
    if (audio.currentTime >= lyrics[i].time) {
      index = i;
      break;
    }
  }

  const prev = lyrics[index - 1];
  const curr = lyrics[index];
  const next = lyrics[index + 1];

  lineElements[0].className = "line show prev";
  lineElements[1].className = "line show active";
  lineElements[2].className = "line show next";

  lineElements[0].innerHTML = prev ? `<div class="main">${prev.text}</div>` : "";
  lineElements[2].innerHTML = next ? `<div class="main">${next.text}</div>` : "";

  if (curr && index !== lastIndex) {
    lineElements[1].innerHTML = `<div class="main">${curr.text}</div>`;

    lineElements[1].classList.remove("pop");
    void lineElements[1].offsetWidth;
    lineElements[1].classList.add("pop");

    lastIndex = index;
  }

  requestAnimationFrame(updateLyrics);
}

updateLyrics();

playBtn.onclick = () => {
  audio.play();
  playBtn.textContent = "❚❚";
};

</script>

</body>
</html>
